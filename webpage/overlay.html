<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PvME Rotation Overlay</title>
    <link rel="stylesheet" href="overlay.css" />
  </head>
  <body>
    <div id="overlay">
      <div id="bar">
        <select id="profile" title="Switch rotation profile"></select>
        <button id="prev" class="navbtn" title="Previous phase (←)">◀</button>
        <span id="title">No rotation loaded</span>
        <button id="next" class="navbtn" title="Next phase (→)">▶</button>
        <button id="gear" class="navbtn gear" title="Edit rotation">⚙</button>
      </div>
      <div id="strip"></div>
      <div id="resize" title="Drag to resize"></div>
    </div>
    <script src="pvme-parse.js"></script>
    <script src="overlay.js"></script>
  </body>
</html>
